# Add new line in the prompt
add_newline = true
# Custom palette
palette = "catppuccin_mocha"

# This is main left hand prompt
# contains custom colors and directory with
# prompt character
format = """
[ÔûæÔûÆÔûô](#a3aed2)\
[ ¯£æ ](bg:#a3aed2 fg:#090c0c)\
[¯é┤](fg:#a3aed2)\
$directory\
[¯é┤ ](fg:#769ff0)\
$linebreak
$character"""

# [¯é┤](bg:#769ff0 fg:#a3aed2)\
# [¯é┤](fg:#212736 bg:#1d2230)\

# Right hand side prompt which contains main other details
right_format = """
$git_branch\
$git_status\
$git_state\
$scala\
$golang\
$java\
$time\
$battery\
$os
"""
[directory]
style = "fg:bold #e3e5e5 bg:#769ff0"
format = "[ $path ]($style)"
truncation_length = 4
truncation_symbol = "ÔÇª/"
read_only = '­ƒöÆ'
# Configuring the GIT repo
repo_root_style = "fg:green bold"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)"

[directory.substitutions]
"~" = "¾░ï£"
"Documents" = "¾░êÖ "
"Downloads" = "´ÇÖ "
"Music" = "´Çü "
"Pictures" = "´Ç¥ "
"amazingJava" = "Java"
"aScala" = "Scala"
"helperScripts" = "Scripts"

[git_branch]
symbol = "´Éÿ"
# style = "bg:#394260"
style = "bold yellow"
#format = '[[ $symbol $branch ](fg:#769ff0 bg:#394260)]($style)'
format = '[ $symbol $branch]($style)'

[git_status]
style = "bg:#394260"
format = '[[($all_status$ahead_behind )](fg:#769ff0 bg:#394260)]($style)'

[git_commit]
commit_hash_length = 4
tag_symbol = '­ƒöû '

[python]
symbol = "¯£╝"
python_binary = ['python', 'python2', 'python3']
detect_extensions = ['py']

[rust]
symbol = "¯×¿"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'

[lua]
symbol = "¾░ó▒"
detect_files = ['.lua', '.lua-version']
detect_extensions = ['lua']
detect_folders = ['lua']

[java]
symbol = "¯£©"
style = "red"
format = "[${symbol} (${version})]($style)"
#detect_extensions = ['java', 'class', 'gradle', 'jar']
#detect_files = ['pom.xml',  'build.sbt', '.java-version']

[scala]
#detect_extensions = ['sbt', 'scala']
#detect_files = ['.scalaenv', '.sbtenv', 'build.sbt']
#detect_folders = ['.metals']
symbol = '¯£À'
style = "fg:bold red"
format = "[${symbol} (${version})]($style)"

[golang]
symbol = "¯ÿº"
style = "bg:#212736"
format = '[[ $symbol ($version) ](fg:#769ff0 bg:#212736)]($style)'
detect_extensions = ['go']
detect_files = ['go.mod', 'go.sum', 'go.work', 'glide.yaml', 'Gopkg.yml', 'Gopkg.lock', '.go-version']
detect_folders = ['Godeps']

[nodejs]
format = 'via [­ƒñû $version](bold green) '

[time]
disabled = false
time_format = "%R" # Hour:Minute Format
style = "bg:#1d2230"
format = '[[ ´É║ $time ](fg:#a0a9cb bg:#1d2230)]($style)'
use_12hr = true
utc_time_offset = '-7'

[os]
format = "on [($name )]($style)"
style = "bold blue"
disabled = false

[os.symbols]
Macos = "¯ÿÁ"

[battery]
full_symbol = '­ƒöï '
charging_symbol = ' ¾░éä '
discharging_symbol = ' ¾░éî '


[shell]
fish_indicator = '¾░ê║ '
powershell_indicator = '´æá_'
unknown_indicator = 'mystery shell'
style = 'cyan bold'
disabled = false


